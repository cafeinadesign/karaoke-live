<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3535"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ff0000" flood-opacity="0.45"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="0" fill="url(#bg)"/>

  <g filter="url(#glow)" fill="url(#bar)">
    <rect x="76"  y="216" width="44" height="80"  rx="8"/>
    <rect x="140" y="176" width="44" height="160" rx="8"/>
    <rect x="204" y="112" width="44" height="288" rx="8"/>
    <rect x="268" y="152" width="44" height="208" rx="8"/>
    <rect x="332" y="88"  width="44" height="336" rx="8"/>
    <rect x="396" y="200" width="44" height="112" rx="8"/>
  </g>
</svg>
