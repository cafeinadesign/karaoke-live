<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3535"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ff0000" flood-opacity="0.55"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Equalizer bars on the right -->
  <g transform="translate(640, 130)" filter="url(#glow)" fill="url(#bar)">
    <rect x="0"   y="80"  width="32" height="80"  rx="6"/>
    <rect x="48"  y="50"  width="32" height="140" rx="6"/>
    <rect x="96"  y="10"  width="32" height="220" rx="6"/>
    <rect x="144" y="40"  width="32" height="160" rx="6"/>
    <rect x="192" y="0"   width="32" height="240" rx="6"/>
    <rect x="240" y="60"  width="32" height="120" rx="6"/>
    <rect x="288" y="20"  width="32" height="200" rx="6"/>
  </g>

  <!-- Title -->
  <text x="80" y="225" font-family="Roboto, sans-serif" font-weight="800" font-size="84" fill="url(#title)" letter-spacing="-2">
    Karaokê Live
  </text>

  <!-- Tagline -->
  <text x="80" y="275" font-family="Roboto, sans-serif" font-weight="400" font-size="26" fill="#aaaaaa" letter-spacing="0.5">
    Fila colaborativa. Microfone aberto.
  </text>

  <!-- Accent line -->
  <rect x="80" y="320" width="80" height="4" rx="2" fill="#ff0000"/>

  <!-- Bottom feature chips -->
  <g font-family="Roboto, sans-serif" font-weight="500" font-size="20" fill="#ffffff">
    <g transform="translate(80, 360)">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#212121"/>
      <text x="90" y="29" text-anchor="middle">QR pra entrar</text>
    </g>
    <g transform="translate(280, 360)">
      <rect x="0" y="0" width="220" height="44" rx="22" fill="#212121"/>
      <text x="110" y="29" text-anchor="middle">Fila em tempo real</text>
    </g>
    <g transform="translate(520, 360)">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#212121"/>
      <text x="90" y="29" text-anchor="middle">YouTube + AI</text>
    </g>
  </g>
</svg>
