<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="base.css" rel="stylesheet">
<style>
  .landing {
    align-items: center;
    text-align: center;
    justify-content: center;
    gap: 0;
  }
  .landing .logo { font-size: 132px; color: #ff0000; }
  .landing .title { font-size: 56px; font-weight: 800; margin-top: 26px; letter-spacing: -1px; }
  .landing .tag { color: #aaaaaa; font-size: 24px; margin-top: 14px; max-width: 420px; line-height: 1.4; }
  .landing .actions { display: flex; flex-direction: column; gap: 18px; width: 100%; margin-top: 64px; }
</style>
</head>
<body>
  <div class="poster">
    <header class="cap">
      <div class="brand"><span class="ms">graphic_eq</span> Karaokê Live</div>
      <h1>Crie uma sala de karaokê <span class="accent">em segundos</span></h1>
    </header>
    <div class="phone">
      <div class="screen">
        <div class="app landing">
          <span class="ms logo">graphic_eq</span>
          <div class="title">Karaokê Live</div>
          <div class="tag">Fila colaborativa. Microfone aberto. Sem desculpas.</div>
          <div class="actions">
            <button class="btn btn-filled"><span class="ms">add_circle</span> Criar sala como host</button>
            <button class="btn btn-tonal"><span class="ms">mic</span> Entrar como convidado</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
