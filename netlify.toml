[build]
  command = "npm run build"
  publish = "dist/karaoke-live/browser"

[build.processing.html]
  pretty_urls = false

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"

# Serve assetlinks.json at the well-known root path (TWA requires this exact URL)
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/pt-BR/.well-known/assetlinks.json"
  status = 200
  force = true

# Language detection on root
[[redirects]]
  from = "/"
  to = "/en-US/"
  status = 302
  conditions = { Language = ["en"] }

[[redirects]]
  from = "/"
  to = "/pt-BR/"
  status = 302

# SPA fallback within each locale
[[redirects]]
  from = "/pt-BR/*"
  to = "/pt-BR/index.html"
  status = 200

[[redirects]]
  from = "/en-US/*"
  to = "/en-US/index.html"
  status = 200

# Catch-all (anything else without locale) → pt-BR as default
[[redirects]]
  from = "/*"
  to = "/pt-BR/index.html"
  status = 200
